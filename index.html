<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#512da8" />
    <title>DumbCharades</title>
    <base href="/dumb-charades/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="DumbCharades_Version2.styles.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
    <!-- Important: Increment the version parameter whenever you update MudBlazor to prevent caching issues -->
    <link href="_content/MudBlazor/MudBlazor.min.css?v=1" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>

        window.startConfetti = function () {

            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 }
            });

        }

    </script>

    <script>
        window.blazorGetWidth = () => window.innerWidth;
    </script>

    <script>

        window.buzzer = {
            load: function () {
                const audio = document.getElementById('buzzer');
                if (audio) {
                    audio.load();
                }
            },
            play: function () {
                const audio = document.getElementById('buzzer');
                if (audio) {
                    audio.currentTime = 0;
                    audio.play();
                }
            }
        };

        window.Cheer = {
            load: function () {
                const audio = document.getElementById('Cheer');
                if (audio) {
                    audio.load();
                }
            },
            play: function () {
                const audio = document.getElementById('Cheer');
                if (audio) {
                    audio.currentTime = 0;
                    audio.play();
                }
            }
        };

    </script>

    <script src="_framework/blazor.webassembly.js"></script>
    <!-- Important: Increment the version parameter whenever you update MudBlazor to prevent caching issues -->
    <script src="_content/MudBlazor/MudBlazor.min.js?v=1"></script>
</body>

</html>
